<!DOCTYPE html>
<html>
<head>
<title>Food Delivery Time Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
background-size:cover;
background-position:center;
}

/* Main Card */

.container{
width:420px;
background:rgba(255,255,255,0.95);
padding:35px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Heading */

.container h2{
text-align:center;
margin-bottom:25px;
color:#ff4b2b;
}

/* Input Groups */

.form-group{
margin-bottom:15px;
}

.form-group label{
font-size:14px;
font-weight:bold;
display:block;
margin-bottom:5px;
}

/* Inputs */

input, select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus, select:focus{
border-color:#ff4b2b;
box-shadow:0 0 5px rgba(255,75,43,0.5);
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff4b2b;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63c1f;
}

/* Result Box */

.result{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:6px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#333;
}

</style>
</head>

<body>
{% for m in get_flashed_messages() %}
<script>
alert("{{m}}")
</script>
{% endfor %}

<div class="container">

<h2>🍔 Delivery Time Prediction</h2>

<form action="{{ url_for('predict') }}" method="post">

<div class="form-group">
<label>Delivery Person Age</label>
<input type="number" name="age" placeholder="Enter age" required>
</div>

<div class="form-group">
<label>Delivery Ratings</label>
<input type="number" step="0.1" name="ratings" placeholder="Example: 4.5" required>
</div>

<div class="form-group">
<label>Distance (KM)</label>
<input type="number" step="0.1" name="distance" placeholder="Enter distance" required>
</div>

<div class="form-group">
<label>Type of Order</label>
<select name="order_type" required>
<option value="">Select Order Type</option>
<option value="buffet">Buffet</option>
<option value="drinks">Drinks</option>
<option value="meal">Meal</option>
<option value="snack">Snack</option>
</select>
</div>

<div class="form-group">
<label>Vehicle Type</label>
<select name="vehicle_type" required>
<option value="">Select Vehicle</option>
<option value="bicycle">Bicycle</option>
<option value="electric_scooter">Electric Scooter</option>
<option value="motorcycle">Motorcycle</option>
<option value="scooter">Scooter</option>
</select>
</div>

<button type="submit">Predict Delivery Time</button>

</form>

{% if prediction %}
<div class="result">
Estimated Delivery Time: {{ prediction }} Minutes
</div>
{% endif %}

</div>

</body>
</html>
