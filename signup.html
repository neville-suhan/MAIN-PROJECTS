<!DOCTYPE html>
<html>
<head>
<title>FoodExpress Signup</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7a3d,#ff4b2b);
}

/* Main Card */

.container{
width:850px;
display:flex;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* Left Image Section */

.left{
flex:1;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
}

.left img{
width:260px;
}

/* Right Signup Section */

.right{
flex:1;
padding:35px;
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
color:#ff4b2b;
margin-bottom:15px;
}

.right h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* Input Fields */

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box input,
.input-box textarea{
width:100%;
padding:12px 40px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
}

textarea{
height:60px;
resize:none;
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:gray;
}

/* Button */

button{
width:100%;
padding:12px;
background:#ff4b2b;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63c1f;
}

/* Extra Links */

.extra{
text-align:center;
margin-top:15px;
font-size:14px;
}

.extra a{
color:#ff4b2b;
text-decoration:none;
}

</style>

</head>

<body>

{% for m in get_flashed_messages() %}
<script>alert("{{m}}")</script>
{% endfor %}

<div class="container">

<!-- Left Side Image -->

<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
</div>


<!-- Right Side Signup -->

<div class="right">

<div class="logo">FoodExpress</div>

<h2>Create your account</h2>

<form action="/signup" method="POST">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" name="name" placeholder="Full Name" required>
</div>



<div class="input-box">
<i class="fa fa-phone"></i>
<input type="tel" name="phoneno" placeholder="Phone Number" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" name="email" placeholder="user@gmail.com"  autocomplete="email" required>
</div>



<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Register</button>

</form>

<div class="extra">
<p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>

</div>

</div>

</body>
</html>
